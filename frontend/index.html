<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Codebase AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:       #0d0d0d;
      --bg2:      #111111;
      --surface:  #1a1a1a;
      --lift:     #212121;
      --card:     #1e1e1e;
      --hover:    #242424;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.10);
      --border3:  rgba(255,255,255,0.16);

      --green:    #22c55e;
      --green2:   #4ade80;
      --green-g:  rgba(34,197,94,0.10);
      --green-g2: rgba(34,197,94,0.06);

      --blue:     #3b82f6;
      --blue2:    #60a5fa;
      --blue-g:   rgba(59,130,246,0.10);

      --purple:   #a855f7;
      --purple-g: rgba(168,85,247,0.10);

      --orange:   #f97316;
      --orange-g: rgba(249,115,22,0.10);

      --rp-width: 200px;
      --red2:     #f87171;
      --red-g:    rgba(239,68,68,0.10);

      --yellow:   #eab308;
      --yellow-g: rgba(234,179,8,0.10);

      --ink:      #f5f5f5;
      --ink2:     #a3a3a3;
      --ink3:     #525252;
      --ink4:     #2a2a2a;
    }
    html,body,#root{height:100%;overflow:hidden;}
    body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;}

    /* ── LAYOUT ── */
    #root{display:flex;height:100vh;}

    /* ── LEFT SIDEBAR ── */
    .sidebar{
      width:240px;flex-shrink:0;
      background:var(--bg2);
      border-right:1px solid var(--border);
      display:flex;flex-direction:column;
      overflow:hidden;
    }

    .sb-head{
      padding:16px 14px 12px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .sb-logo{display:flex;align-items:center;gap:9px;margin-bottom:14px;}
    .sb-logo-icon{
      width:28px;height:28px;border-radius:7px;
      background:linear-gradient(135deg,var(--green),#16a34a);
      display:flex;align-items:center;justify-content:center;
      font-size:13px;box-shadow:0 2px 8px rgba(34,197,94,0.3);
    }
    .sb-logo-name{font-size:14px;font-weight:600;color:var(--ink);letter-spacing:-0.3px;}
    .sb-logo-name span{color:var(--green);}

    .new-chat-btn{
      width:100%;padding:8px 12px;border-radius:8px;
      border:1px solid var(--border2);
      background:var(--surface);color:var(--ink2);
      font-family:'Inter',sans-serif;font-size:12px;font-weight:500;
      cursor:pointer;transition:all 0.15s;
      display:flex;align-items:center;gap:8px;
    }
    .new-chat-btn:hover{background:var(--lift);color:var(--ink);border-color:var(--border3);}
    .new-chat-btn .plus{
      width:16px;height:16px;border-radius:4px;
      background:var(--green-g);color:var(--green);
      display:flex;align-items:center;justify-content:center;font-size:12px;
    }

    /* sidebar nav */
    .sb-nav{padding:10px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .sb-nav-item{
      display:flex;align-items:center;gap:9px;
      padding:7px 8px;border-radius:7px;
      font-size:12px;font-weight:500;color:var(--ink3);
      cursor:pointer;transition:all 0.12s;
    }
    .sb-nav-item:hover{background:var(--surface);color:var(--ink2);}
    .sb-nav-item.active{background:var(--surface);color:var(--ink);}
    .sb-nav-item .ni{font-size:13px;}
    .sb-badge{
      margin-left:auto;background:var(--surface);
      color:var(--ink3);font-size:10px;font-weight:500;
      padding:1px 6px;border-radius:4px;border:1px solid var(--border);
    }

    /* project list */
    .sb-section-title{
      padding:10px 14px 5px;
      font-size:9px;font-weight:600;color:var(--ink3);
      letter-spacing:1.5px;text-transform:uppercase;
      flex-shrink:0;
    }
    .sb-projects{flex:1;overflow-y:auto;padding:0 8px 8px;}
    .sb-projects::-webkit-scrollbar{width:2px;}
    .sb-projects::-webkit-scrollbar-thumb{background:var(--border2);border-radius:1px;}

    .prow{
      display:flex;align-items:center;gap:8px;
      padding:7px 8px;border-radius:7px;
      cursor:pointer;transition:all 0.12s;
      margin-bottom:1px;position:relative;
    }
    .prow:hover{background:var(--surface);}
    .prow:hover .del-btn{opacity:1;}
    .prow.sel{background:var(--green-g);} 
    .prow-icon{
      width:28px;height:28px;border-radius:6px;flex-shrink:0;
      background:var(--surface);border:1px solid var(--border);
      display:flex;align-items:center;justify-content:center;font-size:12px;
    }
    .prow.sel .prow-icon{background:var(--green-g2);border-color:rgba(34,197,94,0.2);}
    .prow-info{flex:1;min-width:0;}
    .pn{font-size:12px;font-weight:500;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prow.sel .pn{color:var(--ink);}
    .pm{font-size:10px;color:var(--ink3);margin-top:1px;}
    .sc{
      display:inline-block;padding:1px 5px;border-radius:3px;
      font-size:9px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;
    }
    .sc-ready{background:var(--green-g);color:var(--green);}
    .sc-proc{background:var(--yellow-g);color:var(--yellow);}

    .del-btn{
      position:absolute;right:6px;top:50%;transform:translateY(-50%);
      width:20px;height:20px;border-radius:5px;border:none;
      background:var(--red-g);color:var(--red2);
      font-size:10px;cursor:pointer;opacity:0;transition:all 0.12s;
      display:flex;align-items:center;justify-content:center;
    }
    .del-btn:hover{background:var(--red);color:#fff;}

    /* skeleton */
    .skel{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:7px;margin-bottom:1px;}
    .skel-icon{width:28px;height:28px;border-radius:6px;background:var(--surface);flex-shrink:0;animation:shimmer 1.4s infinite;background-size:200%;}
    .skel-line{height:9px;border-radius:4px;animation:shimmer 1.4s infinite;background-size:200%;}
    .skel-line,.skel-icon{background:linear-gradient(90deg,var(--surface) 25%,var(--lift) 50%,var(--surface) 75%);background-size:200%;}
    .skel-line.w70{width:70%;}
    .skel-line.w40{width:40%;height:7px;margin-top:4px;}
    @keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

    /* sb bottom */
    .sb-bottom{
      padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0;
    }
    .sb-user{
      display:flex;align-items:center;gap:9px;
      padding:7px 8px;border-radius:7px;cursor:pointer;
    }
    .sb-user:hover{background:var(--surface);}
    .sb-avatar{
      width:28px;height:28px;border-radius:50%;
      background:linear-gradient(135deg,var(--green),var(--blue));
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
    }
    .sb-uname{font-size:12px;font-weight:500;color:var(--ink2);}
    .sb-online{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--ink3);}
    .online-dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:blink 2s infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

    /* ── MAIN ── */
    .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}

    /* topbar */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:0 20px;height:52px;
      border-bottom:1px solid var(--border);
      background:var(--bg2);flex-shrink:0;
    }
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .chat-title{font-size:13px;font-weight:500;color:var(--ink2);}
    .chat-title.active{color:var(--ink);}
    .edit-btn{
      width:22px;height:22px;border-radius:5px;border:none;
      background:transparent;color:var(--ink3);font-size:11px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.12s;
    }
    .edit-btn:hover{background:var(--surface);color:var(--ink2);}
    .topbar-right{display:flex;align-items:center;gap:6px;}
    .tb-btn{
      display:flex;align-items:center;gap:6px;
      padding:5px 10px;border-radius:7px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--ink3);font-family:'Inter',sans-serif;font-size:11px;
      cursor:pointer;transition:all 0.12s;
    }
    .tb-btn:hover{background:var(--lift);color:var(--ink2);border-color:var(--border2);}
    .tb-icon{
      width:26px;height:26px;border-radius:6px;
      border:1px solid var(--border);background:var(--surface);
      display:flex;align-items:center;justify-content:center;
      font-size:12px;cursor:pointer;transition:all 0.12s;
    }
    .tb-icon:hover{background:var(--lift);border-color:var(--border2);}

    /* mode bar */
    .mbar{
      display:flex;gap:4px;padding:8px 20px;
      border-bottom:1px solid var(--border);
      background:var(--bg2);flex-shrink:0;overflow-x:auto;
    }
    .mbar::-webkit-scrollbar{display:none;}
    .mbtn{
      display:flex;align-items:center;gap:6px;
      padding:6px 12px;border-radius:7px;
      border:1px solid transparent;background:transparent;
      color:var(--ink3);font-family:'Inter',sans-serif;
      font-size:11px;font-weight:500;cursor:pointer;
      white-space:nowrap;transition:all 0.12s;
    }
    .mbtn:hover{background:var(--surface);color:var(--ink2);border-color:var(--border);}
    .mbtn.on{font-weight:600;}
    .mbtn.on.explain     {color:var(--blue2);  background:var(--blue-g);  border-color:rgba(59,130,246,0.2);}
    .mbtn.on.interview   {color:var(--yellow); background:var(--yellow-g);border-color:rgba(234,179,8,0.2);}
    .mbtn.on.review      {color:var(--green);  background:var(--green-g); border-color:rgba(34,197,94,0.2);}
    .mbtn.on.debug       {color:var(--red2);   background:var(--red-g);   border-color:rgba(239,68,68,0.2);}
    .mbtn.on.architecture{color:var(--purple); background:var(--purple-g);border-color:rgba(168,85,247,0.2);}

    /* chat */
    .chat-wrap{flex:1;display:flex;overflow:hidden;}
    .chat{flex:1;overflow-y:auto;padding:24px 20px;display:flex;flex-direction:column;gap:20px;}
    .chat::-webkit-scrollbar{width:3px;}
    .chat::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

    /* empty */
    .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;}
    .empty-icon{
      width:56px;height:56px;border-radius:14px;
      background:var(--green-g);border:1px solid rgba(34,197,94,0.2);
      display:flex;align-items:center;justify-content:center;font-size:22px;
      box-shadow:0 4px 20px rgba(34,197,94,0.1);
    }
    .empty-t{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-0.3px;}
    .empty-s{font-size:12px;color:var(--ink3);max-width:260px;line-height:1.7;}

    /* messages */
    .msg{display:flex;flex-direction:column;gap:6px;animation:rise 0.2s ease;}
    @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .mu{align-items:flex-end;}
    .ma{align-items:flex-start;}
    .mwho{font-size:10px;font-weight:500;color:var(--ink3);padding:0 4px;letter-spacing:0.3px;}

    .bub{
      max-width:78%;padding:12px 16px;border-radius:12px;
      font-size:13px;line-height:1.7;
    }
    .mu .bub{
      background:var(--green-g);
      border:1px solid rgba(34,197,94,0.15);
      color:var(--ink);border-bottom-right-radius:3px;
      font-family:'Inter',sans-serif;
    }
    .ma .bub{
      background:var(--surface);
      border:1px solid var(--border);
      color:var(--ink);border-bottom-left-radius:3px;
      max-width:88%;
    }

    /* message actions */
    .msg-actions{
      display:flex;gap:4px;padding:0 4px;
      opacity:0;transition:opacity 0.15s;
    }
    .msg:hover .msg-actions{opacity:1;}
    .ma .msg-actions{align-self:flex-start;}
    .mu .msg-actions{align-self:flex-end;}
    .mact-btn{
      display:flex;align-items:center;gap:4px;
      padding:3px 8px;border-radius:5px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--ink3);font-family:'Inter',sans-serif;font-size:10px;
      cursor:pointer;transition:all 0.12s;
    }
    .mact-btn:hover{background:var(--lift);color:var(--ink2);border-color:var(--border2);}

    /* mode tag */
    .mtag{
      display:inline-flex;align-items:center;gap:5px;
      padding:3px 8px;border-radius:5px;
      font-size:10px;font-weight:600;
      margin-bottom:8px;border:1px solid;
      font-family:'Inter',sans-serif;letter-spacing:0.3px;
    }
    .mt-explain     {color:var(--blue2); border-color:rgba(59,130,246,0.2); background:var(--blue-g);}
    .mt-interview   {color:var(--yellow);border-color:rgba(234,179,8,0.2);  background:var(--yellow-g);}
    .mt-review      {color:var(--green); border-color:rgba(34,197,94,0.2);  background:var(--green-g);}
    .mt-debug       {color:var(--red2);  border-color:rgba(239,68,68,0.2);  background:var(--red-g);}
    .mt-architecture{color:var(--purple);border-color:rgba(168,85,247,0.2); background:var(--purple-g);}

    /* answer render */
    .ans{font-size:13px;line-height:1.8;color:var(--ink2);}
    .ans .ah{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
    .ans .asub{font-size:10px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:1.5px;margin:12px 0 6px;}
    .ans .ap{margin-bottom:8px;color:var(--ink2);}
    .ans .aflow{padding:2px 0;color:var(--ink2);}
    .ans .aflow.step{font-weight:600;color:var(--ink);margin-top:6px;}
    .ans .aflow.arrow{color:var(--green);padding-left:8px;}
    .ans .aflow.sub{color:var(--ink3);padding-left:14px;font-size:12px;}
    .ans .aul{list-style:none;padding:0;margin-bottom:8px;}
    .ans .aul li{padding:3px 0 3px 16px;position:relative;color:var(--ink2);}
    .ans .aul li::before{content:'•';position:absolute;left:2px;color:var(--green2);}
    .ans .aol{list-style:none;padding:0;counter-reset:n;margin-bottom:8px;}
    .ans .aol li{padding:4px 0 4px 26px;position:relative;color:var(--ink2);counter-increment:n;}
    .ans .aol li::before{
      content:counter(n);position:absolute;left:0;
      width:18px;height:18px;background:var(--surface);
      color:var(--ink3);border:1px solid var(--border);
      border-radius:4px;font-size:9px;font-weight:600;
      display:flex;align-items:center;justify-content:center;top:5px;
    }
    .ans .acode{
      font-family:'JetBrains Mono',monospace;font-size:11.5px;
      background:#0a0a0a;border:1px solid var(--border2);
      border-radius:8px;padding:14px 16px;margin:10px 0;
      overflow-x:auto;color:#e2e8f0;line-height:1.65;
      position:relative;
    }
    .ans .aic{
      font-family:'JetBrains Mono',monospace;font-size:11.5px;
      background:var(--surface);border:1px solid var(--border2);
      border-radius:4px;padding:1px 6px;color:var(--green2);
    }
    .ans .ab{font-weight:600;color:var(--ink);}
    .ans .atbl{width:100%;border-collapse:collapse;margin:10px 0;font-size:12px;border-radius:8px;overflow:hidden;}
    .ans .atbl th{background:var(--surface);color:var(--ink3);font-weight:600;padding:8px 12px;border:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:1px;}
    .ans .atbl td{padding:8px 12px;border:1px solid var(--border);color:var(--ink2);}
    .ans .atbl tr:hover td{background:var(--surface);}
    .ans .adivider{border:none;border-top:1px solid var(--border);margin:12px 0;}

    /* typing */
    .typing{
      display:flex;gap:5px;align-items:center;
      padding:12px 16px;background:var(--surface);
      border:1px solid var(--border);border-radius:12px;
      border-bottom-left-radius:3px;width:fit-content;
    }
    .td{width:7px;height:7px;border-radius:50%;animation:tdb 1.3s infinite;}
    .td1{background:var(--green);animation-delay:0s;}
    .td2{background:var(--blue);animation-delay:0.18s;}
    .td3{background:var(--purple);animation-delay:0.36s;}
    @keyframes tdb{0%,60%,100%{transform:scale(0.6);opacity:0.3}30%{transform:scale(1.1);opacity:1}}

    /* right panel */
    .right-panel{
      width:200px;flex-shrink:0;
      border-left:1px solid var(--border);
      background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;
    }
    .rp-head{
      padding:12px 14px;border-bottom:1px solid var(--border);
      font-size:10px;font-weight:600;color:var(--ink3);
      letter-spacing:1px;text-transform:uppercase;flex-shrink:0;
    }
    .ftabs{display:flex;padding:6px 8px;gap:4px;flex-shrink:0;}
    .ftab{
      flex:1;padding:5px 6px;border-radius:6px;
      font-size:10px;font-weight:500;color:var(--ink3);
      background:transparent;border:1px solid transparent;
      cursor:pointer;transition:all 0.12s;font-family:'Inter',sans-serif;
    }
    .ftab:hover{background:var(--surface);color:var(--ink2);}
    .ftab.on{background:var(--surface);color:var(--ink);border-color:var(--border);}

    .fscrl{flex:1;overflow-y:auto;padding:0 8px 8px;}
    .fscrl::-webkit-scrollbar{width:2px;}
    .fscrl::-webkit-scrollbar-thumb{background:var(--border2);}

    .fr{
      display:flex;align-items:center;gap:7px;
      padding:6px 8px;border-radius:7px;margin-bottom:1px;
      border:1px solid transparent;cursor:pointer;transition:all 0.12s;
    }
    .fr:hover{background:var(--surface);border-color:var(--border);}
    .fr.lit{background:var(--green-g2);border-color:rgba(34,197,94,0.12);}
    .fr.lit:hover{background:var(--green-g);}
    .fico{font-size:11px;flex-shrink:0;}
    .fnm{font-size:10px;color:var(--ink3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace;}
    .fr.lit .fnm{color:var(--green2);}
    .fr:hover:not(.lit) .fnm{color:var(--ink2);}
    .fcount{font-size:9px;color:var(--green);margin-left:auto;flex-shrink:0;}

    .tbox{
      padding:12px 14px;border-top:1px solid var(--border);
      background:var(--surface);margin:8px;border-radius:8px;
      border:1px solid var(--border);
    }
    .tlbl{font-size:9px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:1px;}
    .tval{font-size:24px;font-weight:700;color:var(--ink);margin:3px 0 1px;letter-spacing:-1px;font-family:'JetBrains Mono',monospace;}
    .tmdl{font-size:10px;color:var(--ink3);}

    /* bottom input */
    .input-wrap{
      padding:12px 20px 16px;
      border-top:1px solid var(--border);
      background:var(--bg2);flex-shrink:0;
    }
    .ibar{
      display:flex;gap:8px;align-items:flex-end;
      background:var(--surface);
      border:1px solid var(--border2);
      border-radius:12px;padding:8px 8px 8px 14px;
      transition:all 0.15s;
    }
    .ibar:focus-within{border-color:var(--border3);box-shadow:0 0 0 3px rgba(255,255,255,0.03);}
    .ci{
      flex:1;background:transparent;border:none;
      color:var(--ink);font-family:'Inter',sans-serif;font-size:13px;
      outline:none;resize:none;min-height:24px;max-height:120px;
      line-height:1.5;padding:2px 0;
    }
    .ci::placeholder{color:var(--ink3);}
    .sb{
      width:34px;height:34px;border-radius:8px;
      border:none;background:var(--green);color:#fff;font-size:13px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      transition:all 0.15s;flex-shrink:0;
    }
    .sb:hover{background:#16a34a;box-shadow:0 2px 8px rgba(34,197,94,0.3);}
    .sb:disabled{background:var(--lift);color:var(--ink3);cursor:not-allowed;box-shadow:none;}

    /* quick mode chips below input */
    .chips{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
    .chip{
      display:flex;align-items:center;gap:4px;
      padding:4px 10px;border-radius:6px;
      border:1px solid var(--border);background:var(--surface);
      color:var(--ink3);font-family:'Inter',sans-serif;font-size:10px;
      cursor:pointer;transition:all 0.12s;font-weight:500;
    }
    .chip:hover{background:var(--lift);color:var(--ink2);border-color:var(--border2);}
    .chip.active-chip{color:var(--green);border-color:rgba(34,197,94,0.25);background:var(--green-g);}

    /* debug error bar */
    .dbar{padding:8px 20px 0;}
    .erri{
      width:100%;background:var(--surface);
      border:1px solid rgba(239,68,68,0.2);border-radius:8px;
      padding:9px 12px;color:var(--red2);
      font-family:'JetBrains Mono',monospace;font-size:11px;outline:none;
    }
    .erri::placeholder{color:var(--ink3);}
    .erri:focus{border-color:rgba(239,68,68,0.4);}

    /* upload modal trigger */
    .upload-card{
      margin:8px;border-radius:8px;
      border:1px dashed var(--border2);
      background:var(--surface);padding:14px;
      cursor:pointer;text-align:center;transition:all 0.15s;
    }
    .upload-card:hover,.upload-card.over{border-color:var(--green);background:var(--green-g2);}
    .up-ico{font-size:18px;margin-bottom:4px;}
    .up-t{font-size:11px;font-weight:500;color:var(--ink2);}
    .up-s{font-size:10px;color:var(--ink3);margin-top:2px;}

    .fw{padding:0 8px 8px;}
    .orr{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
    .orr-line{flex:1;height:1px;background:var(--border);}
    .orr-txt{font-size:9px;color:var(--ink3);font-weight:500;letter-spacing:0.5px;}
    .ghw{position:relative;margin-bottom:6px;}
    .ghp{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:11px;}
    .inp{
      width:100%;background:var(--surface);border:1px solid var(--border);
      border-radius:7px;padding:7px 10px;color:var(--ink);
      font-family:'Inter',sans-serif;font-size:11px;outline:none;transition:all 0.12s;
    }
    .inp.ghi{padding-left:28px;}
    .inp::placeholder{color:var(--ink3);}
    .inp:focus{border-color:var(--border3);}
    .inp.nm{margin-bottom:6px;}
    .up-btn{
      width:100%;padding:8px;border-radius:7px;
      border:1px solid rgba(34,197,94,0.3);
      background:var(--green-g);color:var(--green2);
      font-family:'Inter',sans-serif;font-weight:600;font-size:11px;
      cursor:pointer;transition:all 0.12s;
    }
    .up-btn:hover{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.5);}
    .up-btn:disabled{opacity:0.3;cursor:not-allowed;}
    .pbar{height:2px;border-radius:1px;background:linear-gradient(90deg,var(--green),var(--blue),var(--green));background-size:200%;margin-top:6px;animation:pani 1.3s linear infinite;}
    @keyframes pani{0%{background-position:0%}100%{background-position:200%}}

    /* confirm overlay */
    .confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;}
    .confirm-box{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:24px;width:300px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
    .confirm-icon{font-size:28px;margin-bottom:10px;}
    .confirm-title{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:6px;}
    .confirm-sub{font-size:12px;color:var(--ink3);margin-bottom:18px;line-height:1.7;}
    .confirm-name{color:var(--red2);font-weight:500;}
    .confirm-btns{display:flex;gap:8px;}
    .confirm-cancel{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);color:var(--ink3);font-family:'Inter',sans-serif;font-size:12px;cursor:pointer;transition:all 0.12s;}
    .confirm-cancel:hover{color:var(--ink);}
    .confirm-delete{flex:1;padding:9px;border-radius:8px;border:none;background:var(--red);color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.12s;}
    .confirm-delete:hover{background:#dc2626;}
    .confirm-delete:disabled{opacity:0.4;cursor:not-allowed;}

    /* toast */
    .toast{position:fixed;bottom:20px;right:20px;padding:10px 14px;border-radius:9px;font-size:12px;font-family:'Inter',sans-serif;font-weight:500;z-index:9999;animation:rise 0.2s ease;border:1px solid;box-shadow:0 4px 20px rgba(0,0,0,0.3);}
    .tts{background:#052e16;border-color:rgba(34,197,94,0.3);color:var(--green2);}
    .tte{background:#450a0a;border-color:rgba(239,68,68,0.3);color:var(--red2);}
    .tti{background:#172554;border-color:rgba(59,130,246,0.3);color:var(--blue2);}

    .ep{padding:20px 12px;font-size:11px;color:var(--ink3);text-align:center;line-height:1.9;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;
    const API = 'http://localhost:8000/api';

    const MODES = [
      { id:'explain',      label:'Explain',      icon:'✦', ph:'How does the authentication work?' },
      { id:'interview',    label:'Interview',     icon:'◈', ph:'Generate 5 interview questions' },
      { id:'review',       label:'Review',        icon:'⊕', ph:'Review code quality and issues' },
      { id:'debug',        label:'Debug',         icon:'⊗', ph:'Why is the database failing?' },
      { id:'architecture', label:'Architecture',  icon:'⬡', ph:'Explain the system architecture' },
    ];

    const EI={py:'🐍',js:'🟡',ts:'🔹',jsx:'⚛️',tsx:'⚛️',html:'🌐',css:'🎨',json:'{}',md:'📄',sql:'🗄',go:'🔵',java:'☕',cpp:'⚙️',sh:'💲'};
    const fi=f=>EI[f.split('.').pop()]||'📄';

    function renderAnswer(raw) {
      if (!raw || typeof raw !== 'string') return <p className="ap">No response received.</p>;
      try {
        const lines = raw.split('\n'); const els = []; let i = 0;
        const fmt = (txt) => {
          if (!txt || typeof txt !== 'string') return txt;
          try {
            const D = '\x01';
            let s = txt
              .replace(/`([^`\n]+)`/g,        (_,c)=>`${D}IC${D}${c}${D}`)
              .replace(/\*\*([^*\n]+)\*\*/g,   (_,b)=>`${D}BO${D}${b}${D}`)
              .replace(/\*([^*\n]+)\*/g,        (_,b)=>`${D}IT${D}${b}${D}`);
            const parts = s.split(D); const out = []; let k = 0;
            while (k < parts.length) {
              if ((parts[k]==='IC'||parts[k]==='BO'||parts[k]==='IT') && k+1<parts.length) {
                const type=parts[k], content=parts[k+1];
                if (type==='IC') out.push(<code key={k} className="aic">{content}</code>);
                else if (type==='BO') out.push(<strong key={k} className="ab">{content}</strong>);
                else out.push(<em key={k}>{content}</em>);
                k+=3;
              } else { if(parts[k])out.push(parts[k]); k++; }
            }
            return out.length ? out : txt;
          } catch(e){return txt;}
        };
        const isFlowStep=ln=>/^[1-9️⃣🔟]+[\s\uFE0F]*[\.:\-\)]/.test(ln)||/^\d+️⃣/.test(ln)||/^[①-⑩]/.test(ln);
        const isArrow=ln=>/^\s*[↓→←↑▼▶]/.test(ln)||ln.trim()==='↓'||ln.trim()==='→';
        const isSub=ln=>/^\s{2,}\(/.test(ln)||/^\s*\(/.test(ln);
        while (i < lines.length) {
          const ln=lines[i]; const trimmed=ln.trim();
          if(!trimmed){i++;continue;}
          if(/^[-─═]{3,}$/.test(trimmed)){els.push(<hr key={`hr-${i}`} className="adivider"/>);i++;continue;}
          if(/^#{1,3}\s/.test(ln)){els.push(<div key={`h-${i}`} className="ah">{ln.replace(/^#+\s*/,'').replace(/\*\*/g,'')}</div>);i++;continue;}
          if(/^\*\*[^*]+\*\*:?\s*$/.test(trimmed)){els.push(<div key={`sub-${i}`} className="asub">{trimmed.replace(/\*\*/g,'').replace(/:$/,'')}</div>);i++;continue;}
          if(trimmed.startsWith('```')){
            const cl=[];i++;
            while(i<lines.length&&!lines[i].trim().startsWith('```')){cl.push(lines[i]);i++;}
            els.push(<pre key={`code-${i}`} className="acode">{cl.join('\n')}</pre>);
            i++;continue;
          }
          if(trimmed.startsWith('|')){
            const tls=[];
            while(i<lines.length&&lines[i].trim().startsWith('|')){
              if(!/^[\|\s\-:]+$/.test(lines[i].trim()))tls.push(lines[i].trim().split('|').filter(c=>c.trim()!==''));
              i++;
            }
            if(tls.length>0){const[h,...rs]=tls;els.push(<table key={`tbl-${i}`} className="atbl"><thead><tr>{h.map((c,k)=><th key={k}>{c.trim()}</th>)}</tr></thead><tbody>{rs.map((r,k)=><tr key={k}>{r.map((c,j)=><td key={j}>{fmt(c.trim())}</td>)}</tr>)}</tbody></table>);}
            continue;
          }
          if(isFlowStep(trimmed)){els.push(<div key={`fs-${i}`} className="aflow step">{fmt(trimmed)}</div>);i++;continue;}
          if(isArrow(trimmed)){els.push(<div key={`arr-${i}`} className="aflow arrow">{trimmed}</div>);i++;continue;}
          if(isSub(ln)){els.push(<div key={`sub2-${i}`} className="aflow sub">{fmt(trimmed)}</div>);i++;continue;}
          if(/^\d+\.\s/.test(trimmed)){
            const its=[];
            while(i<lines.length&&/^\d+\.\s/.test(lines[i].trim())){its.push(lines[i].replace(/^\d+\.\s/,'').trim());i++;}
            els.push(<ol key={`ol-${i}`} className="aol">{its.map((it,k)=><li key={k}>{fmt(it)}</li>)}</ol>);continue;
          }
          if(/^[-*•]\s/.test(trimmed)){
            const its=[];
            while(i<lines.length&&/^[-*•]\s/.test(lines[i].trim())){its.push(lines[i].replace(/^[-*•]\s/,'').trim());i++;}
            els.push(<ul key={`ul-${i}`} className="aul">{its.map((it,k)=><li key={k}>{fmt(it)}</li>)}</ul>);continue;
          }
          const cleaned=ln.replace(/^#+\s/,'');
          if(cleaned.trim())els.push(<p key={`p-${i}`} className="ap">{fmt(cleaned)}</p>);
          i++;
        }
        if(els.length===0)return<pre style={{whiteSpace:'pre-wrap',wordBreak:'break-word',color:'var(--ink2)',fontSize:'13px'}}>{raw}</pre>;
        return <div className="ans">{els}</div>;
      } catch(err){
        return <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-word',color:'var(--ink2)',fontSize:'13px'}}>{raw}</pre>;
      }
    }

    function App(){
      const[projects,setProjects]=useState([]);
      const[loadingProjects,setLoadingProjects]=useState(true);
      const[active,setActive]=useState(null);
      const[mode,setMode]=useState('explain');
      const[messages,setMessages]=useState([]);
      const[question,setQuestion]=useState('');
      const[errMsg,setErrMsg]=useState('');
      const[loading,setLoading]=useState(false);
      const[uploading,setUploading]=useState(false);
      const[drag,setDrag]=useState(false);
      const[ghUrl,setGhUrl]=useState('');
      const[pname,setPname]=useState('');
      const[toast,setToast]=useState(null);
      const[relFiles,setRelFiles]=useState([]);
      const[allFiles,setAllFiles]=useState([]);
      const[tokens,setTokens]=useState(0);
      const[upMode,setUpMode]=useState('zip');
      const[confirmDel,setConfirmDel]=useState(null);
      const[deleting,setDeleting]=useState(false);
      const[showAll,setShowAll]=useState(true);
      const[copied,setCopied]=useState(null);
      const fRef=useRef();const chatEnd=useRef();const sf=useRef(null);

      useEffect(()=>{fetchP();},[]);
      useEffect(()=>{chatEnd.current?.scrollIntoView({behavior:'smooth'});},[messages,loading]);

      const toast_=(msg,t='i')=>{setToast({msg,t});setTimeout(()=>setToast(null),3000);};
      const fetchP=async()=>{
        setLoadingProjects(true);
        try{const r=await fetch(`${API}/projects`);setProjects(await r.json());}catch{}
        finally{setLoadingProjects(false);}
      };
      const fetchProjectFiles=async(projectId)=>{
        try{const r=await fetch(`${API}/projects/${projectId}/files`);if(r.ok){const d=await r.json();setAllFiles(d.files||[]);}}
        catch{setAllFiles([]);}
      };
      const doDelete=async()=>{
        if(!confirmDel)return;setDeleting(true);
        try{
          const r=await fetch(`${API}/projects/${confirmDel.project_id}`,{method:'DELETE'});
          if(!r.ok)throw new Error('Delete failed');
          toast_(`"${confirmDel.name}" deleted`,'s');
          if(active?.project_id===confirmDel.project_id){setActive(null);setMessages([]);setRelFiles([]);}
          setConfirmDel(null);await fetchP();
        }catch(e){toast_(e.message,'e');}
        finally{setDeleting(false);}
      };
      const onDrop=useCallback(e=>{
        e.preventDefault();setDrag(false);
        const f=e.dataTransfer.files[0];
        if(f?.name.endsWith('.zip')){sf.current=f;setUpMode('zip');setPname(f.name.replace('.zip',''));toast_(`${f.name} ready`);}
        else toast_('ZIP files only','e');
      },[]);
      const onSel=e=>{const f=e.target.files[0];if(f){sf.current=f;setUpMode('zip');setPname(f.name.replace('.zip',''));toast_(`${f.name} selected`);}};
      const doUpload=async()=>{
        if(!pname.trim())return toast_('Enter a project name','e');
        setUploading(true);
        try{
          const fd=new FormData();fd.append('project_name',pname.trim());
          let url;
          if(upMode==='zip'){if(!sf.current)return toast_('Select a ZIP file','e');fd.append('file',sf.current);url=`${API}/upload/zip`;}
          else{if(!ghUrl.trim())return toast_('Enter GitHub URL','e');fd.append('github_url',ghUrl.trim());url=`${API}/upload/github`;}
          const r=await fetch(url,{method:'POST',body:fd});
          const d=await r.json();
          if(!r.ok)throw new Error(d.detail||'Upload failed');
          toast_(`${d.project_name} — ${d.total_files} files indexed`,'s');
          setPname('');setGhUrl('');sf.current=null;
          await fetchP();setActive(d);setMessages([]);
        }catch(e){toast_(e.message,'e');}
        finally{setUploading(false);}
      };
      const doSend=async(q)=>{
        const query=q||question;
        if(!query.trim()||!active||loading)return;
        const um={role:'user',text:query,mode};
        setMessages(p=>[...p,um]);setQuestion('');setLoading(true);
        try{
          const body={project_id:active.project_id,mode,question:um.text,
            ...(mode==='debug'&&errMsg?{error_message:errMsg}:{}),
            ...(mode==='interview'?{num_questions:5}:{})};
          const r=await fetch(`${API}/query`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
          const d=await r.json();
          if(!r.ok)throw new Error(d.detail||'Query failed');
          setMessages(p=>[...p,{role:'ai',text:d.answer,mode:d.mode,files:d.relevant_files}]);
          setRelFiles(d.relevant_files||[]);setShowAll(false);
          setTokens(p=>p+(d.tokens_used||0));
        }catch(e){
          setMessages(p=>[...p,{role:'ai',text:`Error: ${e.message}`,mode,files:[]}]);
          toast_(e.message,'e');
        }finally{setLoading(false);}
      };
      const copyMsg=(text)=>{
        navigator.clipboard.writeText(text).then(()=>{
          setCopied(text);setTimeout(()=>setCopied(null),2000);
          toast_('Copied to clipboard','s');
        });
      };
      const retryMsg=(text)=>{setQuestion(text);};
      const fileQuestion=(filename)=>{
        const q={
          explain:`How does ${filename} work? Explain its purpose, main functions, and logic.`,
          review:`Review ${filename} for security issues, bugs, and code quality problems.`,
          debug:`Are there any potential errors or issues in ${filename}?`,
          interview:`Generate 5 interview questions based on the code in ${filename}.`,
          architecture:`Explain the role of ${filename} in the overall system architecture and how it connects to other files.`,
        };
        return q[mode]||`Explain the file ${filename}`;
      };
      const onKey=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();doSend();}};
      const cm=MODES.find(m=>m.id===mode);
      const chatTitle=active?(active.name||active.project_name):'New Chat';

      return(
        <>
          {/* SIDEBAR */}
          <div className="sidebar">
            <div className="sb-head">
              <div className="sb-logo">
                <div className="sb-logo-icon">🧠</div>
                <div className="sb-logo-name">Codebase<span> AI</span></div>
              </div>
              <button className="new-chat-btn" onClick={()=>{setActive(null);setMessages([]);setRelFiles([]);setAllFiles([]);}}>
                <span className="plus">+</span> New Chat
              </button>
            </div>

            <div className="sb-nav">
              <div className="sb-nav-item active"><span className="ni">💬</span> Chats <span className="sb-badge">{projects.length}</span></div>
              <div className="sb-nav-item"><span className="ni">📁</span> Projects</div>
              <div className="sb-nav-item"><span className="ni">⚙️</span> Settings</div>
            </div>

            <div className="sb-section-title">Upload</div>
            <div className={`upload-card ${drag?'over':''}`}
              onClick={()=>fRef.current.click()}
              onDragOver={e=>{e.preventDefault();setDrag(true);}}
              onDragLeave={()=>setDrag(false)} onDrop={onDrop}>
              <div className="up-ico">📦</div>
              <div className="up-t">{sf.current?sf.current.name:'Drop ZIP here'}</div>
              <div className="up-s">or click to browse</div>
              <input ref={fRef} type="file" accept=".zip" style={{display:'none'}} onChange={onSel}/>
            </div>
            <div className="fw">
              <div className="orr"><div className="orr-line"/><div className="orr-txt">or GitHub</div><div className="orr-line"/></div>
              <div className="ghw">
                <span className="ghp">🐙</span>
                <input className="inp ghi" placeholder="github.com/user/repo" value={ghUrl} onChange={e=>{setGhUrl(e.target.value);setUpMode('github');}}/>
              </div>
              <input className="inp nm" placeholder="Project name..." value={pname} onChange={e=>setPname(e.target.value)}/>
              <button className="up-btn" onClick={doUpload} disabled={uploading}>{uploading?'Processing...':'Upload & Analyze'}</button>
              {uploading&&<div className="pbar"/>}
            </div>

            <div className="sb-section-title">Your Projects</div>
            <div className="sb-projects">
              {loadingProjects?[1,2,3].map(n=>(
                <div key={n} className="skel">
                  <div className="skel-icon"/>
                  <div style={{flex:1}}>
                    <div className="skel-line w70"/>
                    <div className="skel-line w40"/>
                  </div>
                </div>
              )):projects.length===0?(
                <div className="ep">No projects yet.<br/>Upload a ZIP to begin.</div>
              ):projects.map(p=>(
                <div key={p.project_id} className={`prow ${active?.project_id===p.project_id?'sel':''}`}
                  onClick={()=>{setActive(p);setMessages([]);setRelFiles([]);setShowAll(true);fetchProjectFiles(p.project_id);}}>
                  <div className="prow-icon" style={{background:`hsl(${(p.name.charCodeAt(0)*47)%360},40%,25%)`,color:`hsl(${(p.name.charCodeAt(0)*47)%360},70%,65%)`,fontSize:12,fontWeight:700,fontFamily:'Inter,sans-serif'}}>
                    {p.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="prow-info">
                    <div className="pn">{p.name}</div>
                    <div className="pm">{p.total_files}f · {p.total_chunks}c · <span className={`sc sc-${p.status}`}>{p.status}</span></div>
                  </div>
                  <button className="del-btn" onClick={e=>{e.stopPropagation();setConfirmDel(p);}}>✕</button>
                </div>
              ))}
            </div>

            <div className="sb-bottom">
              <div className="sb-user">
                <div className="sb-avatar">U</div>
                <div>
                  <div className="sb-uname">Developer</div>
                  <div className="sb-online"><div className="online-dot"/> Online</div>
                </div>
              </div>
            </div>
          </div>

          {/* MAIN */}
          <div className="main">
            {/* topbar */}
            <div className="topbar">
              <div className="topbar-left">
                <span style={{fontSize:14}}>💬</span>
                <span className={`chat-title ${active?'active':''}`}>{chatTitle}</span>
                {active&&<button className="edit-btn" title="Rename">✏️</button>}
              </div>
              <div className="topbar-right">
                {active&&<button className="tb-btn" onClick={()=>{setMessages([]);setRelFiles([]);setShowAll(true);}}>🔄 Clear</button>}
                <div className="tb-icon" title="Bookmark">🔖</div>
                <div className="tb-icon" title="Settings">⚙️</div>
              </div>
            </div>

            {/* mode bar */}
            <div className="mbar">
              {MODES.map(m=>(
                <button key={m.id} className={`mbtn ${m.id} ${mode===m.id?'on':''}`} onClick={()=>setMode(m.id)}>
                  <span>{m.icon}</span>{m.label}
                </button>
              ))}
            </div>

            {/* chat + right panel */}
            <div className="chat-wrap">
              <div className="chat">
                {messages.length===0?(
                  <div className="empty">
                    <div className="empty-icon">{cm.icon}</div>
                    <div className="empty-t">{cm.label} Mode</div>
                    <div className="empty-s">{active?`Ask anything about "${active.name||active.project_name}"`:'Select or upload a project to get started'}</div>
                  </div>
                ):messages.map((msg,idx)=>(
                  <div key={idx} className={`msg ${msg.role==='user'?'mu':'ma'}`}>
                    <div className="mwho">{msg.role==='user'?'You':'Codebase AI'}</div>
                    <div className="bub">
                      {msg.role==='ai'&&<div className={`mtag mt-${msg.mode}`}>{MODES.find(m=>m.id===msg.mode)?.icon} {msg.mode}</div>}
                      {msg.role==='ai'?renderAnswer(msg.text):msg.text}
                    </div>
                    <div className="msg-actions">
                      <button className="mact-btn" onClick={()=>copyMsg(msg.text)}>
                        {copied===msg.text?'✓ Copied':'📋 Copy'}
                      </button>
                      {msg.role==='user'&&(
                        <button className="mact-btn" onClick={()=>retryMsg(msg.text)}>🔄 Retry</button>
                      )}
                    </div>
                  </div>
                ))}
                {loading&&(
                  <div className="msg ma">
                    <div className="mwho">Codebase AI</div>
                    <div className="typing"><div className="td td1"/><div className="td td2"/><div className="td td3"/></div>
                  </div>
                )}
                <div ref={chatEnd}/>
              </div>

              {/* right panel */}
              <div className="right-panel">
                <div className="rp-head">📁 Files</div>
                <div className="ftabs">
                  <button className={`ftab ${showAll?'on':''}`} onClick={()=>setShowAll(true)}>All {allFiles.length>0&&`(${allFiles.length})`}</button>
                  <button className={`ftab ${!showAll?'on':''}`} onClick={()=>setShowAll(false)}>Used {relFiles.length>0&&`(${relFiles.length})`}</button>
                </div>
                <div className="fscrl">
                  {showAll?(
                    allFiles.length===0
                      ?<div className="ep">{active?'Loading files...':'Select a project\nto see its files'}</div>
                      :allFiles.map((f,i)=>{
                        const isUsed=relFiles.includes(f);
                        return(
                          <div key={i} className={`fr ${isUsed?'lit':''}`}
                            title={`[${mode}] ${f}`}
                            onClick={()=>setQuestion(fileQuestion(f))}>
                            <span className="fico">{fi(f)}</span>
                            <span className="fnm">{f}</span>
                            {isUsed&&<span className="fcount">✦</span>}
                          </div>
                        );
                      })
                  ):(
                    relFiles.length===0
                      ?<div className="ep">Files used in last answer appear here</div>
                      :relFiles.map((f,i)=>(
                        <div key={i} className="fr lit"
                          title={`[${mode}] ${f}`}
                          onClick={()=>setQuestion(fileQuestion(f))}>
                          <span className="fico">{fi(f)}</span>
                          <span className="fnm">{f}</span>
                        </div>
                      ))
                  )}
                </div>
                <div style={{padding:'8px'}}>
                  <div className="tbox">
                    <div className="tlbl">Tokens Used</div>
                    <div className="tval">{tokens>0?tokens.toLocaleString():'—'}</div>
                    <div className="tmdl">{tokens>0?(active?'Ollama · Local':'OpenRouter'):'No queries yet'}</div>
                  </div>
                </div>
              </div>
            </div>

            {/* debug error bar */}
            {mode==='debug'&&(
              <div className="dbar">
                <input className="erri" placeholder="Paste error or stack trace here (optional)..." value={errMsg} onChange={e=>setErrMsg(e.target.value)}/>
              </div>
            )}

            {/* input */}
            <div className="input-wrap">
              <div className="ibar">
                <textarea className="ci"
                  placeholder={active?cm.ph:'Select a project first...'}
                  value={question}
                  onChange={e=>setQuestion(e.target.value)}
                  onKeyDown={onKey}
                  disabled={!active||loading}
                  rows={1}/>
                <button className="sb" onClick={()=>doSend()} disabled={!active||loading||!question.trim()}>➤</button>
              </div>
            </div>
          </div>

          {toast&&<div className={`toast tt${toast.t}`}>{toast.msg}</div>}

          {confirmDel&&(
            <div className="confirm-overlay" onClick={()=>!deleting&&setConfirmDel(null)}>
              <div className="confirm-box" onClick={e=>e.stopPropagation()}>
                <div className="confirm-icon">🗑️</div>
                <div className="confirm-title">Delete Project?</div>
                <div className="confirm-sub">
                  Permanently delete <span className="confirm-name">"{confirmDel.name}"</span> and all its indexed vectors. This cannot be undone.
                </div>
                <div className="confirm-btns">
                  <button className="confirm-cancel" onClick={()=>setConfirmDel(null)} disabled={deleting}>Cancel</button>
                  <button className="confirm-delete" onClick={doDelete} disabled={deleting}>{deleting?'Deleting...':'Delete'}</button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
